# M20Pro map asset manifest.
#
# Keep map assets here so navigation, mapping, and deployment scripts all refer
# to the same PGM/PCD products. These are ordinary selectable map assets;
# cross-floor routes are configured separately and are never inferred from the
# map labels below.

map_set:
  name: "m20pro_map_library"
  description: "M20Pro 可选择地图资产库。"
  default_map_id: "builtin_F20"
  frame_id: "map"
  global_pcd: "package://m20pro_bringup/maps/Original_map/full_cloud.pcd"
  source_note: "F19、F20、F21 仅作为普通地图资产；地图标签不代表已配置跨楼层路线。"

maps:
  - id: "builtin_F19"
    floor: "F19"
    level: 19
    label: "19楼"
    map_yaml: "package://m20pro_bringup/maps/F19/occ_grid.yaml"
    pcd_map: "package://m20pro_bringup/maps/Original_map/full_cloud.pcd"
    z_min: -1.0
    z_max: 1.5
    z_offset: 0.0

  - id: "builtin_F20"
    floor: "F20"
    level: 20
    label: "20楼"
    map_yaml: "package://m20pro_bringup/maps/F20/occ_grid.yaml"
    pcd_map: "package://m20pro_bringup/maps/Original_map/full_cloud.pcd"
    z_min: -1.0
    z_max: 1.5
    z_offset: 0.0

  - id: "builtin_F21"
    floor: "F21"
    level: 21
    label: "21楼"
    map_yaml: "package://m20pro_bringup/maps/F21/occ_grid.yaml"
    pcd_map: "package://m20pro_bringup/maps/Original_map/full_cloud.pcd"
    z_min: -1.0
    z_max: 1.5
    z_offset: 0.0
