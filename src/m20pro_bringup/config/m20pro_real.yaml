m20pro_tcp_bridge:
  ros__parameters:
    robot_ip: "10.21.31.103"
    tcp_port: 30001
    poll_rate_hz: 5.0
    cmd_vel_rate_hz: 20.0
    cmd_vel_timeout_s: 0.5
    send_idle_zero_commands: false
    max_linear_x: 0.8 #原0.8
    max_linear_y: 0.5 #原0.5
    max_angular_z: 1.1
    linear_x_sign: 1.0
    linear_y_sign: 1.0
    angular_z_sign: 1.0
    map_frame: "map"
    odom_frame: "odom"
    base_frame: "m20pro_base_link"
    vendor_position_scale: 1.0
    vendor_position_offset_x: 0.0
    vendor_position_offset_y: 0.0
    vendor_position_offset_z: 0.0
    max_abs_map_position_m: 1000.0
    pose_source: "auto"
    enable_tf_pose_fallback: true
    tf_pose_fallback_topic: "/tf"
    handle_steer_topic: "/HANDLE_STEER"
    tf_pose_fallback_map_frame: "map"
    tf_pose_fallback_base_frame: "base_link"
    tf_pose_fallback_max_age_s: __FIELD_PROFILE_TF_FALLBACK_MAX_AGE__
    tf_pose_fallback_require_location_ok: true
    # Uncommanded localization jumps are never accepted after a stability delay.
    pose_jump_accept_after_s: 0.0
    pose_jump_reject_m: __FIELD_PROFILE_POSE_JUMP_REJECT__
    pose_jump_candidate_radius_m: __FIELD_PROFILE_POSE_JUMP_CANDIDATE_RADIUS__
    pose_jump_candidate_yaw_tolerance_rad: __FIELD_PROFILE_POSE_JUMP_CANDIDATE_YAW__
    pose_stationary_drift_reject_m: __FIELD_PROFILE_STATIONARY_DRIFT_REJECT__
    pose_stationary_drift_reject_yaw_rad: __FIELD_PROFILE_STATIONARY_DRIFT_REJECT_YAW__
    pose_motion_command_hold_s: __FIELD_PROFILE_MOTION_COMMAND_HOLD__
    handle_steer_motion_hold_s: __FIELD_PROFILE_HANDLE_STEER_HOLD__
    posture_transition_hold_s: __FIELD_PROFILE_POSTURE_HOLD__
    posture_transition_z_delta_m: __FIELD_PROFILE_POSTURE_Z_DELTA__
    posture_transition_tilt_delta_rad: __FIELD_PROFILE_POSTURE_TILT_DELTA__
    pose_command_linear_deadband_mps: __FIELD_PROFILE_LINEAR_DEADBAND__
    pose_command_angular_deadband_rad_s: __FIELD_PROFILE_ANGULAR_DEADBAND__
    pose_filter_hold_last_good_s: __FIELD_PROFILE_FILTER_HOLD_LAST_GOOD__
    pose_relocalization_jump_grace_s: __FIELD_PROFILE_RELOCALIZATION_GRACE__
    pose_relocalization_jump_grace_radius_m: __FIELD_PROFILE_RELOCALIZATION_GRACE_RADIUS__
    odom_rebase_jump_m: __FIELD_PROFILE_ODOM_REBASE_JUMP__
    odom_rebase_jump_yaw_rad: __FIELD_PROFILE_ODOM_REBASE_JUMP_YAW__
    flatten_odom_z: true
    odom_z: 0.0
    publish_tf: true
    enable_native_goal_bridge: false
    enable_axis_command: false
    enable_gait_command: true
    gait_command_topic: "/m20pro/gait_command"
    gait_flat_param: 1
    gait_assist_param: 12
    gait_stair_param: 14
    enable_motion_state_command: true
    motion_state_command_topic: "/m20pro/motion_state_command"
    motion_state_result_topic: "/m20pro_tcp_bridge/motion_state_result"
    motion_state_response_timeout_s: 2.0
    enable_charge_command: true
    charge_command_topic: "/m20pro/charge_command"
    charge_result_topic: "/m20pro_tcp_bridge/charge_result"
    charge_response_timeout_s: 4.0
    enable_usage_mode_command: false
    usage_mode_command_topic: "/m20pro/usage_mode_command"
    enable_initialpose_relocalization: false
    enable_initialpose_3d_relocalization: false
    initialpose_topic: "/initialpose"
    initialpose_3d_topic: "/m20pro/initialpose_3d"
    relocalization_response_timeout_s: 2.0
    # 手册规定 1002/6 基础状态只向发送心跳的客户端主动上报。
    send_heartbeat: true

m20pro_grid_planner:
  ros__parameters:
    map_topic: "/map"
    pose_topic: "/m20pro_tcp_bridge/map_pose"
    goal_topic: "/planner_goal"
    path_topic: "/planned_path"
    occupied_threshold: 65
    inflate_radius_m: 0.30 #原0.25
    allow_unknown: false
    path_downsample: 3
    snap_to_nearest_free: true
    snap_search_radius_m: 0.8
