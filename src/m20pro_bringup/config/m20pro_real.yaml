m20pro_tcp_bridge:
  ros__parameters:
    robot_ip: "10.21.31.103"
    tcp_port: 30001
    poll_rate_hz: 5.0
    cmd_vel_rate_hz: 20.0
    cmd_vel_timeout_s: 0.5
    send_idle_zero_commands: false
    max_linear_x: 0.8 #原0.8
    max_linear_y: 0.5 #原0.5
    max_angular_z: 1.1
    linear_x_sign: 1.0
    linear_y_sign: 1.0
    angular_z_sign: 1.0
    map_frame: "map"
    odom_frame: "odom"
    base_frame: "m20pro_base_link"
    vendor_position_scale: 1.0
    vendor_position_offset_x: 0.0
    vendor_position_offset_y: 0.0
    vendor_position_offset_z: 0.0
    max_abs_map_position_m: 1000.0
    pose_source: "official_tf"
    enable_tf_pose_fallback: true
    tf_pose_fallback_topic: "/tf"
    tf_pose_fallback_map_frame: "map"
    tf_pose_fallback_base_frame: "base_link"
    tf_pose_fallback_max_age_s: 1.0
    tf_pose_fallback_require_location_ok: true
    # Uncommanded localization jumps are never accepted after a stability delay.
    pose_jump_accept_after_s: 0.0
    pose_jump_candidate_radius_m: 0.30
    pose_jump_candidate_yaw_tolerance_rad: 0.35
    pose_stationary_drift_reject_m: 0.20
    pose_stationary_drift_reject_yaw_rad: 0.30
    pose_motion_command_hold_s: 1.0
    pose_command_linear_deadband_mps: 0.03
    pose_command_angular_deadband_rad_s: 0.05
    odom_rebase_jump_m: 0.6
    odom_rebase_jump_yaw_rad: 0.75
    flatten_odom_z: true
    odom_z: 0.0
    publish_tf: true
    enable_native_goal_bridge: false
    enable_axis_command: false
    enable_gait_command: true
    gait_command_topic: "/m20pro/gait_command"
    gait_flat_param: 1
    gait_assist_param: 12
    gait_stair_param: 14
    enable_usage_mode_command: false
    usage_mode_command_topic: "/m20pro/usage_mode_command"
    enable_initialpose_relocalization: false
    enable_initialpose_3d_relocalization: false
    initialpose_topic: "/initialpose"
    initialpose_3d_topic: "/m20pro/initialpose_3d"
    relocalization_response_timeout_s: 2.0
    send_heartbeat: false

m20pro_grid_planner:
  ros__parameters:
    map_topic: "/map"
    pose_topic: "/m20pro_tcp_bridge/map_pose"
    goal_topic: "/planner_goal"
    path_topic: "/planned_path"
    occupied_threshold: 65
    inflate_radius_m: 0.30 #原0.25
    allow_unknown: false
    path_downsample: 3
    snap_to_nearest_free: true
    snap_search_radius_m: 0.8
