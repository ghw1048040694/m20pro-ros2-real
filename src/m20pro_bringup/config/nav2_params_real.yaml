amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "m20pro_base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 15.0
    laser_min_range: 0.2
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "differential"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: false
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: "/scan"

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: m20pro_base_link
    odom_topic: /odom
    default_bt_xml_filename: "$(find-pkg-share m20pro_bringup)/behavior_trees/m20pro_navigate_to_pose_foxy.xml"
    enable_groot_monitoring: false
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: __FIELD_PROFILE_CONTROLLER_FREQUENCY__
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Rotation near a waypoint is valid progress for this wheel-legged platform.
      # Foxy's SimpleProgressChecker only measures translation, so use a small
      # translation threshold and enough time for the final heading correction.
      required_movement_radius: __FIELD_PROFILE_PROGRESS_RADIUS__
      movement_time_allowance: __FIELD_PROFILE_PROGRESS_TIME__

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: __FIELD_PROFILE_XY_GOAL_TOLERANCE__
      # Position and heading use the field-tested arrival envelope. Keep XY
      # at 0.35 m and do not require a final rotation below the platform's
      # repeatable low-speed turning capability.
      yaw_goal_tolerance: __FIELD_PROFILE_YAW_GOAL_TOLERANCE__
      # Foxy can retain the XY-reached latch across back-to-back goals. Recheck
      # position for every control cycle so a matching yaw cannot finish a far goal.
      stateful: false

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      publish_local_plan: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: __FIELD_PROFILE_MAX_LINEAR_SPEED__
      max_vel_y: 0.0
      max_vel_theta: __FIELD_PROFILE_MAX_ANGULAR_SPEED__
      min_speed_xy: 0.0
      max_speed_xy: __FIELD_PROFILE_MAX_LINEAR_SPEED__
      min_speed_theta: 0.0
      acc_lim_x: __FIELD_PROFILE_LINEAR_ACCELERATION__
      acc_lim_y: 0.0
      acc_lim_theta: __FIELD_PROFILE_ANGULAR_ACCELERATION__
      decel_lim_x: __FIELD_PROFILE_LINEAR_DECELERATION__
      decel_lim_y: 0.0
      decel_lim_theta: __FIELD_PROFILE_ANGULAR_DECELERATION__
      vx_samples: __FIELD_PROFILE_LINEAR_SAMPLES__
      vy_samples: 1
      vtheta_samples: __FIELD_PROFILE_ANGULAR_SAMPLES__
      sim_time: __FIELD_PROFILE_SIMULATION_TIME__
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: __FIELD_PROFILE_XY_GOAL_TOLERANCE__
      trans_stopped_velocity: __FIELD_PROFILE_STOPPED_LINEAR_SPEED__
      short_circuit_trajectory_evaluation: true
      stateful: false
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      ObstacleFootprint.scale: __FIELD_PROFILE_OBSTACLE_CRITIC_SCALE__
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.22
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.22
      PathDist.scale: 28.0
      GoalDist.scale: 22.0
      RotateToGoal.scale: 28.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: __FIELD_PROFILE_LOCAL_COSTMAP_UPDATE_FREQUENCY__
      publish_frequency: __FIELD_PROFILE_LOCAL_COSTMAP_PUBLISH_FREQUENCY__
      global_frame: odom
      robot_base_frame: m20pro_base_link
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      # Vendor URDF body is 0.75 m long and wheel-leg outer width is about
      # 0.51 m. Include a small physical margin instead of the old 0.25 m
      # circle, which under-represented the front and rear of the robot.
      footprint: "[[-0.40, -0.27], [-0.40, 0.27], [0.40, 0.27], [0.40, -0.27]]"
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
          obstacle_range: __FIELD_PROFILE_OBSTACLE_RANGE__
          raytrace_range: __FIELD_PROFILE_RAYTRACE_RANGE__
          observation_persistence: __FIELD_PROFILE_OBSERVATION_PERSISTENCE__

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: __FIELD_PROFILE_INFLATION_COST_SCALING__
        inflation_radius: __FIELD_PROFILE_INFLATION_RADIUS__

      # A rolling costmap update does not carry its changed origin. Publish the
      # full 100x100 grid so task-start alignment checks see the current center.
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: __FIELD_PROFILE_GLOBAL_COSTMAP_UPDATE_FREQUENCY__
      publish_frequency: __FIELD_PROFILE_GLOBAL_COSTMAP_PUBLISH_FREQUENCY__
      global_frame: map
      robot_base_frame: m20pro_base_link
      use_sim_time: false
      footprint: "[[-0.40, -0.27], [-0.40, 0.27], [0.40, 0.27], [0.40, -0.27]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
          obstacle_range: __FIELD_PROFILE_OBSTACLE_RANGE__
          raytrace_range: __FIELD_PROFILE_RAYTRACE_RANGE__
          observation_persistence: __FIELD_PROFILE_OBSERVATION_PERSISTENCE__

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: __FIELD_PROFILE_INFLATION_COST_SCALING__
        inflation_radius: __FIELD_PROFILE_INFLATION_RADIUS__

      always_send_full_costmap: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    expected_planner_frequency: __FIELD_PROFILE_PLANNER_FREQUENCY__
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: __FIELD_PROFILE_PLANNER_GOAL_TOLERANCE__
      use_astar: true
      allow_unknown: true

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "back_up", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    back_up:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: m20pro_base_link
    transform_timeout: 0.1
    use_sim_time: false
    simulate_ahead_time: __FIELD_PROFILE_RECOVERY_SIMULATION_TIME__
    max_rotational_vel: __FIELD_PROFILE_MAX_ANGULAR_SPEED__
    min_rotational_vel: __FIELD_PROFILE_RECOVERY_MIN_ANGULAR_SPEED__
    rotational_acc_lim: __FIELD_PROFILE_ANGULAR_ACCELERATION__
